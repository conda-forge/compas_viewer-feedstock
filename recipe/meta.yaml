{% set name = "compas_viewer" %}
{% set version = "1.6.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 37a64a16b3246113f570208265ca6b1fc30afc8ddca2dbfb514d5529bfeb3a92

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv"

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - compas >=2.2
    - freetype-py
    - pyopengl
    - pyside6

test:
  requires:
    - python {{ python_min }}
  imports:
    - compas_viewer

about:
  home: https://compas.dev/compas_viewer/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Viewer for COMPAS 2 based on PyOpenGL and PyQt6.'
  doc_url: https://compas.dev/compas_viewer/
  dev_url: https://github.com/compas-dev/compas_viewer

extra:
  recipe-maintainers:
    - tomvanmele
    - Licini
